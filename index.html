<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Would You Share the Weekend With Me?</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="valentine-title">
        <div class="avatar" aria-hidden="true">
          <svg viewBox="0 0 160 140" role="img" focusable="false">
            <defs>
              <linearGradient id="catFace" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#f7c89b" />
                <stop offset="1" stop-color="#f2b07f" />
              </linearGradient>
            </defs>
            <path
              d="M80 18c22 0 40 18 40 40v18c0 22-18 40-40 40S40 98 40 76V58c0-22 18-40 40-40z"
              fill="url(#catFace)"
            />
            <path d="M48 22l-18 26 28-10z" fill="#f2b07f" />
            <path d="M112 22l18 26-28-10z" fill="#f2b07f" />
            <circle cx="68" cy="66" r="5" fill="#2f2f2f" />
            <circle cx="92" cy="66" r="5" fill="#2f2f2f" />
            <path d="M80 72l-6 6 6 6 6-6z" fill="#f08aa5" />
            <path d="M92 20c16 0 28 12 28 28v8" fill="none" stroke="#f08aa5" stroke-width="10" stroke-linecap="round" />
            <path d="M108 20c12 0 22 10 22 22" fill="none" stroke="#f55d7b" stroke-width="10" stroke-linecap="round" />
          </svg>
        </div>

        <h1 id="valentine-title">Would you share the weekend with me?</h1>
        <p class="subtext">Pick your answer below.</p>

        <div class="buttons" aria-live="polite">
          <button class="btn btn-yes" type="button">Yes</button>
          <button class="btn btn-no" type="button">No</button>
        </div>
        <p class="helper-text">“No” seems a bit shy 🐱</p>
      </section>
    </main>

    <div class="overlay hidden" id="celebrateOverlay" role="dialog" aria-modal="true" aria-labelledby="celebrate-title">
      <div class="overlay-card">
        <h2 id="celebrate-title">Yay!</h2>
        <img
          class="celebrate-gif"
          src="https://media.giphy.com/media/26tOZ42Mg6pbTUPHW/giphy.gif"
          alt="Celebration animation"
        />
        <button class="btn btn-close" type="button">Close</button>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
